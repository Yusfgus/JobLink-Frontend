<main class="saved-jobs-page">
    @for (job of (savedJobs | async) | slice:first:(first + rows); track job.id) {
    <app-job-card [job]="job"></app-job-card>
    }
    @empty {

    }

    <!-- Pagination -->
    <div class="pagination-container" *ngIf="_savedJobService.TotalCount > 0">
        <p-paginator (onPageChange)="onPageChange($event)" [rows]="rows" [totalRecords]="_savedJobService.TotalCount"
            [showJumpToPageDropdown]="false" />
    </div>

</main>
