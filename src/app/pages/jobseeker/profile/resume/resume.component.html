<div class="section-card editorial-card">
    <div class="section-header">
        <span class="material-symbols-outlined section-icon">description</span>
        <div>
            <h2 class="section-title">Resume</h2>
            <p class="section-subtitle">Upload or manage your resume / CV</p>
        </div>
    </div>

    <p-divider />

    <div class="upload-area">
        <span class="material-symbols-outlined upload-icon">upload_file</span>
        <p class="upload-hint">Drag & drop your resume here, or</p>
        <p-button label="Browse File" icon="pi pi-upload" styleClass="primary-gradient-btn" />
        <p class="upload-note">Supported formats: PDF, DOC, DOCX — Max 5 MB</p>
    </div>
</div>
