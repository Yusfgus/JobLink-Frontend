<main class="applications-page">
    @for (application of applications() | slice:first:(first + rows); track application.jobId) {
    <app-application-card [application]="application"></app-application-card>
    }
    @empty {

    }

    <!-- Pagination -->
    <div class="pagination-container" *ngIf="_applicationService.TotalCount > 0">
        <p-paginator (onPageChange)="onPageChange($event)" [first]="first" [rows]="rows"
            [totalRecords]="_applicationService.TotalCount" [showJumpToPageDropdown]="false" />
    </div>

</main>
